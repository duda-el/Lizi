<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ლიზი — დაბადების დღე</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      .scene {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
        background: radial-gradient(
          ellipse at 40% 60%,
          #d4b896 0%,
          #b89060 40%,
          #9a7040 100%
        );
        overflow: hidden;
        position: relative;
      }

      /* ---- BALLOONS ---- */
      .balloon-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 200;
        overflow: hidden;
      }

      .balloon {
        position: absolute;
        bottom: -140px;
        width: 54px;
        height: 66px;
        border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
        opacity: 0;
        animation: floatUp 4.5s ease-in forwards;
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -22px;
        left: 50%;
        transform: translateX(-50%);
        width: 1px;
        height: 22px;
        background: rgba(0, 0, 0, 0.25);
      }

      .balloon::before {
        content: "";
        position: absolute;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%);
        width: 6px;
        height: 6px;
        background: inherit;
        filter: brightness(0.7);
        border-radius: 50% 50% 40% 40%;
      }

      /* shine */
      .balloon .shine {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 12px;
        height: 16px;
        background: rgba(255, 255, 255, 0.35);
        border-radius: 50%;
        transform: rotate(-30deg);
      }

      @keyframes floatUp {
        0% {
          transform: translateX(0) translateY(0);
          opacity: 0;
        }
        5% {
          transform: translateX(0) translateY(-4vh);
          opacity: 1;
        }
        85% {
          transform: translateX(var(--sway)) translateY(-95vh);
          opacity: 1;
        }
        100% {
          transform: translateX(var(--sway)) translateY(-115vh);
          opacity: 0;
        }
      }

      /* ---- ENVELOPE ---- */
      .env-wrap {
        position: relative;
        width: 460px;
        height: 320px;
        cursor: pointer;
        filter: drop-shadow(0 20px 48px rgba(60, 30, 0, 0.45))
          drop-shadow(0 4px 12px rgba(60, 30, 0, 0.3));
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
      }

      .env-wrap.hiding {
        opacity: 0;
        transform: scale(0.92) translateY(20px);
        pointer-events: none;
      }

      .env-body {
        position: absolute;
        inset: 0;
        border-radius: 3px;
        background-color: #ede4d4;
        background-image:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(180, 160, 120, 0.12) 3px,
            rgba(180, 160, 120, 0.12) 4px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 3px,
            rgba(180, 160, 120, 0.1) 3px,
            rgba(180, 160, 120, 0.1) 4px
          );
        border: 1px solid #c8b080;
      }

      .env-bl {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 0 148px 230px;
        border-color: transparent transparent #d8cdb0 transparent;
        z-index: 2;
      }
      .env-br {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 0;
        height: 0;
        border-style: solid;
        border-width: 0 230px 148px 0;
        border-color: transparent #d8cdb0 transparent transparent;
        z-index: 2;
      }
      .env-crease {
        position: absolute;
        top: 162px;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(140, 100, 40, 0.18);
        z-index: 3;
      }

      .env-flap {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 0;
        border-left: 230px solid transparent;
        border-right: 230px solid transparent;
        border-top: 162px solid #e0d5be;
        transform-origin: top center;
        transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 6;
      }
      .env-wrap.opening .env-flap {
        transform: rotateX(180deg);
      }

      .seal {
        position: absolute;
        top: 130px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 80px;
        z-index: 10;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.3s ease;
      }
      .seal:hover {
        transform: translateX(-50%) scale(1.05);
      }
      .seal:active {
        transform: translateX(-50%) scale(0.97);
      }
      .env-wrap.opening .seal {
        opacity: 0;
        pointer-events: none;
      }
      .seal svg {
        width: 80px;
        height: 80px;
        filter: drop-shadow(0 4px 10px rgba(80, 40, 0, 0.45));
      }

      /* ---- LETTER ---- */
      .letter {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.85);
        width: 400px;
        background: #faf6ec;
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 28px,
          rgba(180, 160, 120, 0.15) 28px,
          rgba(180, 160, 120, 0.15) 29px
        );
        border: 1px solid #d4c090;
        border-radius: 2px;
        padding: 36px 40px 32px;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        box-shadow:
          0 12px 40px rgba(60, 30, 0, 0.25),
          0 3px 8px rgba(60, 30, 0, 0.15);
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
      }
      .letter.visible {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        pointer-events: auto;
        z-index: 100;
      }

      .letter-from {
        font-family: "Cormorant Garamond", serif;
        font-size: 11px;
        letter-spacing: 3px;
        color: #9a7830;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .letter-to {
        font-family: "Great Vibes", cursive;
        font-size: 54px;
        color: #2c1a00;
        line-height: 1;
        margin-bottom: 4px;
      }
      .letter-divider {
        width: 60px;
        height: 1px;
        background: #c0a050;
        margin: 12px auto;
      }
      .voucher {
        border: 1.5px solid #c0a050;
        border-radius: 2px;
        padding: 16px 20px;
        background: linear-gradient(135deg, #fffbf0, #fff8e0);
        position: relative;
      }
      .voucher::before {
        content: "✦";
        position: absolute;
        top: 6px;
        left: 8px;
        color: #c0a050;
        font-size: 10px;
      }
      .voucher::after {
        content: "✦";
        position: absolute;
        bottom: 6px;
        right: 8px;
        color: #c0a050;
        font-size: 10px;
      }
      .v-label {
        font-family: "Cormorant Garamond", serif;
        font-size: 10px;
        letter-spacing: 2.5px;
        color: #9a7830;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .v-amount {
        font-family: "Cormorant Garamond", serif;
        font-size: 42px;
        font-weight: 600;
        color: #7a2010;
        line-height: 1;
      }
      .letter-sig {
        font-family: "Great Vibes", cursive;
        font-size: 26px;
        color: #5a3a10;
        margin-top: 16px;
      }

      .hint {
        text-align: center;
        margin-top: 18px;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 14px;
        color: rgba(255, 240, 210, 0.75);
        letter-spacing: 0.5px;
        transition: opacity 0.4s ease;
      }
      .hint.hidden {
        opacity: 0;
      }

      /* ---- MOBILE ---- */
      @media (max-width: 520px) {
        .env-wrap {
          width: 340px;
          height: 237px;
        }
        .env-body {
          border-radius: 2px;
        }
        .env-bl {
          border-width: 0 0 110px 170px;
        }
        .env-br {
          border-width: 0 170px 110px 0;
        }
        .env-crease {
          top: 120px;
        }
        .env-flap {
          border-left-width: 170px;
          border-right-width: 170px;
          border-top-width: 120px;
        }
        .seal {
          top: 96px;
          width: 70px;
          height: 70px;
        }
        .seal svg {
          width: 70px;
          height: 70px;
        }
        .letter {
          width: 88vw;
          padding: 28px 24px 24px;
        }
        .letter-to {
          font-size: 44px;
        }
        .v-amount {
          font-size: 36px;
        }
        .balloon {
          width: 44px;
          height: 54px;
        }
      }
    </style>
  </head>
  <body>
    <div class="balloon-container" id="balloons"></div>

    <div class="scene" id="scene">
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 14px;
        "
      >
        <div class="env-wrap" id="env" onclick="openEnv()">
          <div class="env-body"></div>
          <div class="env-bl"></div>
          <div class="env-br"></div>
          <div class="env-crease"></div>
          <div class="env-flap"></div>

          <div
            class="seal"
            onclick="
              event.stopPropagation();
              openEnv();
            "
          >
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <radialGradient id="wG" cx="38%" cy="35%">
                  <stop offset="0%" stop-color="#d4904a" />
                  <stop offset="50%" stop-color="#b06820" />
                  <stop offset="100%" stop-color="#7a4010" />
                </radialGradient>
                <radialGradient id="wH" cx="35%" cy="30%">
                  <stop offset="0%" stop-color="rgba(255,220,160,0.35)" />
                  <stop offset="100%" stop-color="rgba(255,200,100,0)" />
                </radialGradient>
              </defs>
              <path
                d="M40 6 C44 6 47 3 50 5 C53 7 53 11 56 12 C59 13 62 11 64 13 C66 15 65 19 67 21 C69 23 73 23 74 26 C75 29 73 32 74 35 C75 38 78 40 78 43 C78 46 75 48 74 51 C73 54 75 57 73 59 C71 61 68 61 66 63 C64 65 64 68 62 70 C60 72 57 71 55 73 C53 75 52 78 49 79 C46 80 44 78 41 78 C38 78 36 80 33 79 C30 78 29 75 27 73 C25 71 22 72 20 70 C18 68 18 65 16 63 C14 61 11 61 9 59 C7 57 9 54 8 51 C7 48 4 46 4 43 C4 40 7 38 8 35 C9 32 7 29 8 26 C9 23 13 23 15 21 C17 19 16 15 18 13 C20 11 23 13 26 12 C29 11 29 7 32 5 C35 3 38 6 40 6Z"
                fill="url(#wG)"
              />
              <ellipse cx="34" cy="30" rx="16" ry="10" fill="url(#wH)" />
              <circle
                cx="40"
                cy="40"
                r="24"
                fill="none"
                stroke="rgba(255,200,120,0.3)"
                stroke-width="1"
              />
              <text
                x="40"
                y="37"
                text-anchor="middle"
                font-family="Cormorant Garamond, serif"
                font-size="22"
                font-weight="600"
                font-style="italic"
                fill="rgba(255,235,180,0.85)"
              >
                L
              </text>
              <text
                x="40"
                y="52"
                text-anchor="middle"
                font-family="Cormorant Garamond, serif"
                font-size="9"
                letter-spacing="2"
                fill="rgba(255,220,160,0.65)"
              >
                ✦✦✦
              </text>
            </svg>
          </div>
        </div>

        <div class="hint" id="hint">HAPPY BIRTHDAY 🥳</div>
      </div>

      <div class="letter" id="letter">
        <div class="letter-from">სიყვარულით ანასგან ❤️</div>
        <div class="letter-to">ლიზის</div>
        <div class="letter-divider"></div>
        <div class="voucher">
          <div class="v-label">ვაუჩერი</div>
          <div class="v-amount">100 ₾</div>
        </div>
      </div>
    </div>

    <script>
      const COLORS = [
        "#FF6B9D",
        "#FF8E53",
        "#FFD93D",
        "#6BCB77",
        "#4D96FF",
        "#C77DFF",
        "#FF4D6D",
        "#00C9A7",
        "#FFA552",
        "#A29BFE",
        "#FF6EB4",
        "#48DBFB",
      ];

      function launchBalloons() {
        const container = document.getElementById("balloons");
        const total = 28;

        for (let i = 0; i < total; i++) {
          setTimeout(() => {
            const b = document.createElement("div");
            b.className = "balloon";
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            b.style.background = color;
            b.style.left = 5 + Math.random() * 90 + "vw";
            b.style.animationDuration = 1.4 + Math.random() * 0.8 + "s";
            b.style.animationDelay = "0s";
            b.style.setProperty(
              "--sway",
              (Math.random() > 0.5 ? 1 : -1) * (10 + Math.random() * 20) + "px",
            );

            // size variation
            const scale = 0.8 + Math.random() * 0.6;
            b.style.width = 54 * scale + "px";
            b.style.height = 66 * scale + "px";

            const shine = document.createElement("div");
            shine.className = "shine";
            b.appendChild(shine);

            container.appendChild(b);
            setTimeout(
              () => b.remove(),
              (parseFloat(b.style.animationDuration) + 0.5) * 1000,
            );
          }, i * 55);
        }

        // second wave
        for (let i = 0; i < 18; i++) {
          setTimeout(
            () => {
              const b = document.createElement("div");
              b.className = "balloon";
              const color = COLORS[Math.floor(Math.random() * COLORS.length)];
              b.style.background = color;
              b.style.left = 5 + Math.random() * 90 + "vw";
              const dur = 1.4 + Math.random() * 0.8;
              b.style.animationDuration = dur + "s";
              b.style.animationDelay = "0s";
              b.style.setProperty(
                "--sway",
                (Math.random() > 0.5 ? 1 : -1) * (10 + Math.random() * 20) +
                  "px",
              );
              const scale = 0.8 + Math.random() * 0.6;
              b.style.width = 54 * scale + "px";
              b.style.height = 66 * scale + "px";
              const shine = document.createElement("div");
              shine.className = "shine";
              b.appendChild(shine);
              container.appendChild(b);
              setTimeout(() => b.remove(), (dur + 0.5) * 1000);
            },
            800 + i * 60,
          );
        }
      }

      function openEnv() {
        const env = document.getElementById("env");
        const letter = document.getElementById("letter");
        const hint = document.getElementById("hint");

        if (env.classList.contains("opening")) return;

        env.classList.add("opening");
        hint.classList.add("hidden");

        // launch balloons when flap opens
        setTimeout(launchBalloons, 400);

        setTimeout(() => {
          env.classList.add("hiding");
          setTimeout(() => {
            env.style.display = "none";
            letter.classList.add("visible");
          }, 500);
        }, 600);
      }
    </script>
  </body>
</html>
